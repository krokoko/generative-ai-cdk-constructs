# ~~ Generated by projen. To modify, edit .projenrc.ts and run "npx projen".

name: pull-request-lint
on:
  pull_request_target:
    types:
      - labeled
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - edited
jobs:
  validate:
    name: Validate PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: amannn/action-semantic-pull-request@01d5fd8a8ebb9aafe902c40c53f0f4744f7381eb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |-
            feat
            fix
            chore
          requireScope: false
          githubBaseUrl: ${{ github.api_url }}
  contributorStatement:
    name: Require Contributor Statement
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    env:
      PR_BODY: ${{ github.event.pull_request.body }}
      EXPECTED: |-
        * [ ] Testing
        - Unit test added (prefer not to modify an existing test, otherwise, it's probably a breaking change)
        - Integration test added (if adding a new pattern or making a significant update to an existing pattern)
        * [ ] Docs
        - __README__: README and/or documentation topic updated
        - __Design__: For significant features, link to the RFC proposal
        * [ ] Title and Description
        - __Change type__: title prefixed with **fix**, **feat** or **chore** and module name in parenthesis, which will appear in changelog
        - __Title__: use lower-case and doesn't end with a period
        - __Breaking?__: last paragraph: "BREAKING CHANGE: <describe what changed + link for details>"
        - __Issues__: Indicate issues fixed via: "**Fixes #xxx**" or "**Closes #xxx**"

        By submitting this pull request, I confirm that you can use, modify, copy, and redistribute this contribution, under the terms of the project license.
      HELP: Contributor statement missing from PR description. Please include the following text in the PR description
    if: "!(github.event.pull_request.user.login == 'amazon-auto' || github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'emerging-tech-cdk-constructs-bot' || github.event.pull_request.user.login == 'generative-ai-cdk-constructs-bot' || github.event.pull_request.user.login == 'github-actions')"
    steps:
      - uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410
        with:
          script: |-
            const actual = process.env.PR_BODY.replace(/\r?\n/g, "\n");
            const expected = process.env.EXPECTED.replace(/\r?\n/g, "\n");
            if (!actual.includes(expected)) {
                console.log("%j", actual);
                console.log("%j", expected);
                core.setFailed(`${process.env.HELP}: ${expected}`);
            }
